<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사용 설명서 — AXLIB</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#080810;color:#e8e4ff;
  font-family:'Segoe UI',Arial,sans-serif;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:40px 20px;
  position:relative;overflow-x:hidden;
}

/* 배경 글로우 */
.bg-glow{
  position:fixed;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 50% at 50% 50%, rgba(125,60,255,0.13) 0%, transparent 70%);
}

/* 헤더 로고 */
.logo{
  position:fixed;top:0;left:0;width:100%;
  padding:16px 40px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(8,8,16,0.9);backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(125,60,255,0.25);
  z-index:100;
}
.logo-text{font-size:1.4rem;font-weight:700;letter-spacing:2px;color:#c4a8ff;text-decoration:none;}
.logo-text span{color:#7d3cff;}
.logo-back{
  display:flex;align-items:center;gap:6px;
  color:rgba(196,168,255,0.6);text-decoration:none;font-size:0.85rem;
  transition:color .2s;
}
.logo-back:hover{color:#c4a8ff;}

/* 메인 컨텐츠 */
.content{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;
  text-align:center;margin-top:60px;
  max-width:560px;width:100%;
}

.badge{
  display:inline-block;
  background:rgba(125,60,255,0.15);
  border:1px solid rgba(125,60,255,0.4);
  color:#b388ff;font-size:0.72rem;letter-spacing:1.5px;
  padding:5px 16px;border-radius:999px;margin-bottom:20px;
  text-transform:uppercase;
}

.content h1{
  font-size:2.4rem;font-weight:700;
  color:#ddd0ff;letter-spacing:-0.5px;margin-bottom:10px;
}
.content p{
  color:rgba(196,168,255,0.5);font-size:0.95rem;
  line-height:1.7;margin-bottom:44px;
}

/* 기기 선택 카드 */
.device-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:16px;
  width:100%;
}

.device-card{
  display:flex;flex-direction:column;align-items:center;
  background:rgba(28,22,50,0.7);
  border:1px solid rgba(125,60,255,0.2);
  border-radius:20px;padding:36px 24px;
  text-decoration:none;color:inherit;
  transition:transform .3s, border-color .3s, box-shadow .3s;
  position:relative;overflow:hidden;cursor:pointer;
}
.device-card::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 50% 0%, rgba(125,60,255,0.08), transparent 65%);
  pointer-events:none;
}
.device-card:hover{
  transform:translateY(-6px);
  border-color:rgba(125,60,255,0.5);
  box-shadow:0 14px 36px rgba(125,60,255,0.15);
}
.device-card.disabled{
  opacity:0.45;cursor:not-allowed;
  border-color:rgba(125,60,255,0.1);
}
.device-card.disabled:hover{
  transform:none;box-shadow:none;border-color:rgba(125,60,255,0.1);
}

.device-icon{
  width:64px;height:64px;border-radius:18px;
  background:rgba(125,60,255,0.15);border:1px solid rgba(125,60,255,0.25);
  display:flex;align-items:center;justify-content:center;
  font-size:1.8rem;margin-bottom:18px;
  transition:background .3s;
}
.device-card:not(.disabled):hover .device-icon{
  background:rgba(125,60,255,0.28);
}

.device-name{
  font-size:1.05rem;font-weight:600;color:#ddd0ff;margin-bottom:6px;
}
.device-desc{
  font-size:0.82rem;color:rgba(196,168,255,0.45);line-height:1.5;
}

.badge-chip{
  margin-top:14px;padding:4px 12px;border-radius:999px;font-size:0.72rem;font-weight:600;
}
.badge-available{
  background:rgba(30,180,100,0.15);color:#5edfaa;border:1px solid rgba(30,180,100,0.25);
}
.badge-unavailable{
  background:rgba(255,255,255,0.06);color:rgba(196,168,255,0.35);border:1px solid rgba(255,255,255,0.08);
}

/* 토스트 팝업 */
.toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);
  background:rgba(40,30,70,0.95);border:1px solid rgba(125,60,255,0.35);
  color:#ddd0ff;padding:13px 22px;border-radius:12px;font-size:0.88rem;
  opacity:0;transition:opacity .3s, transform .3s;pointer-events:none;
  white-space:nowrap;backdrop-filter:blur(10px);
  display:flex;align-items:center;gap:8px;
  z-index:9998;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* 디스코드 버튼 */
.discord-btn{
  position:fixed;right:20px;bottom:20px;
  background:#5865F2;color:white;text-decoration:none;
  padding:12px 20px;border-radius:999px;font-weight:600;font-size:0.88rem;
  display:flex;align-items:center;gap:8px;
  box-shadow:0 6px 20px rgba(88,101,242,0.4);z-index:9999;transition:.3s;
}
.discord-btn:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(88,101,242,0.5);}

@media(max-width:480px){
  .device-grid{grid-template-columns:1fr;}
  .content h1{font-size:1.9rem;}
  .logo{padding:14px 20px;}
}
</style>
</head>
<body>

<div class="bg-glow"></div>

<!-- 헤더 -->
<div class="logo">
  <a href="index.html" class="logo-back">
    <i class="ti ti-arrow-left" aria-hidden="true"></i> 홈으로
  </a>
  <a href="index.html" class="logo-text">AX<span>LIB</span></a>
  <div style="width:70px;"></div>
</div>

<!-- 메인 -->
<div class="content">
  <div class="badge">사용 설명서</div>
  <h1>기기를 골라주세요</h1>
  <p>사용 중인 기기에 맞는 설명서를 선택하세요.<br>안드로이드 기기를 지원하고 있습니다.</p>

  <div class="device-grid">

    <!-- 안드로이드 -->
    <a href="android_manual.html" class="device-card">
      <div class="device-icon">
        <i class="ti ti-brand-android" aria-hidden="true" style="color:#b388ff"></i>
      </div>
      <div class="device-name">안드로이드</div>
      <div class="device-desc">Galaxy, Pixel 등<br>Android 기기</div>
      <div class="badge-chip badge-available">
        <i class="ti ti-check" aria-hidden="true"></i> 지원됨
      </div>
    </a>

    <!-- 아이폰 -->
    <div class="device-card disabled" onclick="iosClick()">
      <div class="device-icon">
        <i class="ti ti-brand-apple" aria-hidden="true" style="color:rgba(196,168,255,0.3)"></i>
      </div>
      <div class="device-name">아이폰</div>
      <div class="device-desc">iPhone, iPad 등<br>iOS 기기</div>
      <div class="badge-chip badge-unavailable">
        <i class="ti ti-x" aria-hidden="true"></i> 미지원
      </div>
    </div>

  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast">
  <i class="ti ti-info-circle" aria-hidden="true" style="color:#b388ff"></i>
  현재 iPhone(iOS) 버전은 지원되지 않습니다.
</div>

<!-- 디스코드 버튼 -->
<a href="https://discord.gg/DxY47Q3EHR" target="_blank" class="discord-btn">
  <i class="ti ti-brand-discord" aria-hidden="true"></i> 고객 문의
</a>

<script>
function iosClick(){
  const toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2800);
}
</script>
</body>
</html>
