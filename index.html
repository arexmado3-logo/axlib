<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>AXLIB</title>

<style>
body{
    background:#111;
    color:white;
    text-align:center;
    font-family:Arial;
}

h1{
    color:#a855f7;
}

.btn{
    background:#7e22ce;
    color:white;
    border:none;
    padding:15px 25px;
    border-radius:10px;
    cursor:pointer;
    margin:10px;
}

.btn:hover{
    transform:scale(1.05);
}

#info{
    display:none;
    margin-top:20px;
    background:#222;
    padding:20px;
    border-radius:10px;
}
</style>
</head>
<body>

<h1>AXLIB</h1>

<button class="btn" onclick="support()">
💜 후원하기
</button>

<button class="btn" onclick="manual()">
📖 사용 설명서
</button>

<div id="info">
    🔩 전산볼트 앱 개발 진행중!
</div>

<script>
function support(){
    alert("후원 페이지로 이동합니다!");
    window.open("boost.html","_blank");
}

function manual(){
    let box = document.getElementById("info");

    if(box.style.display === "none"){
        box.style.display = "block";
    }else{
        box.style.display = "none";
    }
}
</script>

</body>
</html>
